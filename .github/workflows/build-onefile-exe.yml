name: Build One-File Backend EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-standalone-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Build standalone EXE
        run: npm run build:exe:win --prefix backend

      - name: Rename output EXE
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path backend/dist -Filter *.exe | Select-Object -First 1
          if (-not $exe) {
            throw "No EXE generated in backend/dist"
          }
          Rename-Item -Path $exe.FullName -NewName "velo-win-x64.exe"

      - name: Copy SQLite native binary next to EXE
        shell: pwsh
        run: |
          $nodeFile = Get-ChildItem -Path backend/node_modules -Filter better_sqlite3.node -Recurse | Select-Object -First 1
          if (-not $nodeFile) {
            throw "better_sqlite3.node not found in backend/node_modules"
          }
          Copy-Item -Path $nodeFile.FullName -Destination backend/dist/better_sqlite3.node -Force

      - name: Upload standalone package
        uses: actions/upload-artifact@v4
        with:
          name: velo-win-x64
          path: |
            backend/dist/velo-win-x64.exe
            backend/dist/better_sqlite3.node
          if-no-files-found: error
